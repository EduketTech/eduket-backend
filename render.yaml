services:
  - type: web
    name: chatbot-backend-educat
    env: python
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      apt-get update -qq
      apt-get install -y -qq libreoffice --no-install-recommends
    startCommand: gunicorn app:app --workers 2 --timeout 180 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
